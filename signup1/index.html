<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Signup Flow</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="glass-wrapper">
        <div class="glass-card">
            <div class="circle-aura"></div>
            <div class="content">
                <h1 class="glow-text">Hello.</h1>
                <p class="desc">The future of design starts here. Join the community today.</p>
                <div class="btn-stack">
                    <button class="btn-glass">Sign Up</button>
                    <button class="btn-text">I already have an account</button>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <div class="content">
                <h2>Create Account</h2>
                <div class="input-container">
                    <div class="input-field">
                        <input type="text" placeholder="Username">
                    </div>
                    <div class="input-field">
                        <input type="email" placeholder="Email">
                    </div>
                    <div class="input-field">
                        <input type="password" placeholder="Password">
                    </div>
                </div>
                <button class="btn-gradient">Continue</button>
                <p class="terms">By clicking continue, you agree to our <a href="#">Policy</a></p>
            </div>
        </div>

        <div
